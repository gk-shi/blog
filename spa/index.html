  <style>
    .open-screen-animation {
      position: absolute;
      z-index: 1000;
      width: 100vw;
      height: 100vh;
      background-color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      animation: remove-blank .01s linear .6s forwards;
    }

    @keyframes remove-blank {
      from {
        opacity: 1;
      }

      to {
        opacity: 0;
        z-index: -1;
      }
    }

    .open-screen-loading {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    .open-screen-img {
      width: 30px;
      height: 30px;
      animation: icon-rotate .5s linear infinite;
    }

    .open-screen-text {
      margin-left: 10px;
    }

    @keyframes icon-rotate {
      from {
        transform: rotateZ(0);
      }

      to {
        transform: rotateZ(360deg);
      }
    }

    .open-wrapper {
      width: 100vw;
      height: 200px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom right,
          rgba(0, 0, 0, 0) 0%,
          rgba(0, 0, 0, 0) calc(50% - 1px),
          rgba(204, 204, 204, 1) 50%,
          rgba(0, 0, 0, 0) calc(50% + 1px),
          rgba(0, 0, 0, 0) 100%);
      animation: wrapper-scale .5s linear 1 forwards;
    }

    @keyframes wrapper-scale {
      from {
        transform: scale(1);
      }

      to {
        transform: scale(0);
      }
    }

    .circle {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 1px solid #ccc;
      box-sizing: border-box;
      position: relative;
      animation: circle-rotate .5s linear 1 forwards;
    }

    @keyframes circle-rotate {
      from {
        transform: rotateZ(0);
      }

      to {
        transform: rotateZ(360deg);
      }
    }

    .ball {
      position: absolute;
      top: 4px;
      width: 10px;
      height: 10px;
      background-color: #ccc;
      border-radius: 50%;
    }
  </style>
</head>

<body>
  <div class="open-screen-animation">
    <div class="position open-wrapper">
      <div class="circle">
        <div class="ball"></div>
      </div>
    </div>
  </div>
  <div id="app">
    <p class="open-screen-loading">
      <img src="/img/loading.png"
           alt=""
           class="open-screen-img">
      <span class="open-screen-text">内容正在飞速过来~</span>
    </p>
